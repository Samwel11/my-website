<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Form</title>
</head>
<body>
    <h1>Patient Registration Form</h1>
    <form action="/submit_registration" method="post">
        <p>Please fill in all the required fields.</p>
        <label for="first_name">First Name:</label><br>
        <input type="text" id="first_name" name="first_name" required><br><br>

        <label for="last_name">Last Name:</label><br>
        <input type="text" id="last_name" name="last_name" required><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
    
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

         <label for="residence">County</label>:</label><br>
        <input type="text" id="residence" name="residence" required><br><br>

    

        <label for="gender">Gender:</label><br>
        <select id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>

        <label for="service">Service:</label><br>
        <select id="service" name="service" required>
            <option value="">Select</option>
            <option value="checkboxes">Primary Care</option>
            <option value="counseling">Counsultation</option>
            <option value="laboratory">Laboratory Test</option>
            <option value="pharmacy">Pharmacy</option>
        </select><br><br>
        <input type="submit" value="Register">

    
</body>
